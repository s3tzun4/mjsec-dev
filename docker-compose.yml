services:
  web:
    image: ${APP_IMAGE:seoyedogu/my-ncp:latest}
    container_name: flask_app
    expose:
      - "5000"
    restart: always

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./nginx:/etc/nginx/templates:ro
      - ./certbot/config:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        if [ -f "/etc/letsencrypt/live/$${DOMAIN}/fullchain.pem" ] && [ -f "/etc/letsencrypt/live/$${DOMAIN}/privkey.pem" ]; then
          envsubst '$$DOMAIN' < /etc/nginx/templates/default.conf > /etc/nginx/conf.d/default.conf
        else
          envsubst '$$DOMAIN' < /etc/nginx/templates/bootstrap.conf > /etc/nginx/conf.d/default.conf
        fi
        exec nginx -g 'daemon off;'
    depends_on:
      - web
    restart: always

  certbot:
    image: certbot/certbot:latest
    profiles:
      - certbot
    volumes:
      - ./certbot/config:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
