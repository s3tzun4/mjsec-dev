name: CD

on:
  workflow_run:
    workflows: [ "CI" ]
    types: [ "completed" ]

jobs:
  build-push-and-deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/my-ncp:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/my-ncp:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan (HIGH/CRITICAL fail)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: v0.69.3
          token-setup-trivy: ${{ secrets.GITHUB_TOKEN }}
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/my-ncp:${{ github.event.workflow_run.head_sha }}
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: table

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NCP_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.NCP_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare remote deploy directory
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.NCP_USER }}@${{ secrets.NCP_HOST }} "mkdir -p /tmp/my_repo"

      - name: Copy deploy files
        run: |
          scp -i ~/.ssh/id_rsa -r docker-compose.yml nginx \
            ${{ secrets.NCP_USER }}@${{ secrets.NCP_HOST }}:/tmp/my_repo/

      - name: Select image to deploy
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.NCP_USER }}@${{ secrets.NCP_HOST }} "
            echo APP_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/my-ncp:${{ github.event.workflow_run.head_sha }} > /tmp/my_repo/.env
          "

      - name: Deploy on NCP
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.NCP_USER }}@${{ secrets.NCP_HOST }} "
            cd /tmp/my_repo &&
            systemctl stop nginx || true &&
            systemctl disable nginx || true &&
            docker compose pull &&
            docker compose up -d --remove-orphans
          "
