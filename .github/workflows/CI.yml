name: CI

on:
  push:
    branches:
      - main
      - dev
      - "feature/**"
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci_fast:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint
        run: ruff check .

      - name: Python syntax check
        run: python -m compileall app.py

  ci_pr_full:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies and tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint
        run: ruff check .

      - name: Python syntax check
        run: python -m compileall app.py

      - name: Compose config validation
        run: docker compose config

      - name: Build and start full stack
        run: docker compose up -d --build

      # - name: Health smoke test
      #   run: |
      #     for i in $(seq 1 20); do
      #       if curl -fsS http://127.0.0.1:5000/health > /dev/null; then
      #         echo "Health check passed"
      #         exit 0
      #       fi
      #       echo "Waiting app startup... ($i/20)"
      #       sleep 3
      #     done
      #     echo "Health check failed"
      #     exit 1

      # - name: Core auth pytest
      #   run: |
      #     pip install pytest
      #     pytest -q tests/test_auth_flow.py

      - name: Tear down
        if: always()
        run: docker compose down --volumes --remove-orphans
